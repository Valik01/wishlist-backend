spring:
  application:
    name: wishlist
  datasource:
    url: jdbc:postgresql://localhost:5432/wishlist
    username: wishlist
    password: wishlist
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/db.changelog-master.yaml

telegram:
  auth:
    bot-token: dummy-dev-token
    auth-date-max-age-seconds: 300
    auth-date-allowed-clock-skew-seconds: 60

jwt:
  secret: a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef12345678
  expiration: 43200000
