databaseChangeLog:
  - changeSet:
      id: 1-005-create-reservation-history-table
      author: aliaksei.valiuk
      changes:
        - createTable:
            tableName: reservation_history
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: item_id
                  type: INT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_history_item
                    references: items(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_history_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()