databaseChangeLog:
  - changeSet:
      id: 1-003-create-item-table
      author: aliaksei.valiuk
      changes:
        - createTable:
            tableName: items
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: wishlist_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_item_wishlist
                    references: wishlists(id)
                    deleteCascade: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: DECIMAL(10,2)
              - column:
                  name: currency
                  type: VARCHAR(32)
              - column:
                  name: url
                  type: VARCHAR(512)
              - column:
                  name: photo_url
                  type: VARCHAR(512)
              - column:
                  name: reserved_by
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_item_reserved_by
                    references: users(id)
                    deleteSetNull: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()